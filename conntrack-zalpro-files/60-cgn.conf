# /etc/rsyslog.d/60-cgn.conf
# Receives Juniper MX CGN/NAT syslog on UDP 20514 and streams each line
# directly into the PHP parser (parser.php) via omprog, in real time.

module(load="imudp")
module(load="omprog")

input(type="imudp" port="20514")

# Template: reception timestamp (UTC, rsyslog's own clock) + raw message.
# We use rsyslog's timegenerated (not the Junos-embedded timestamp) because
# it's guaranteed present and consistently formatted.
template(name="cgnTemplate" type="string" string="%timegenerated:::date-rfc3339% %msg%\n")

if $syslogfacility-text == 'local3' then {
    action(
        type="omprog"
        binary="/usr/bin/php /opt/cgn-logger/parser.php"
        template="cgnTemplate"
        useTransactions="off"
        confirmMessages="off"
        # restart the PHP process automatically if it ever dies
        forceSingleInstance="on"
    )
    stop
}
