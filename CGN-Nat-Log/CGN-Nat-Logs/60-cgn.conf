# /etc/rsyslog.d/60-cgn.conf
#
# Receives Juniper MX CGN/NAT syslog on UDP 20514 and streams each line
# directly into the PHP parser (parser.php) via omprog, in real time.
#
# IMPORTANT: uses its own dedicated ruleset (cgnRuleset) so these messages
# don't fall through to default/other rsyslog rules and get silently
# swallowed before reaching omprog.

module(load="imudp")
module(load="omprog")

template(name="cgnTemplate" type="string" string="%timegenerated:::date-rfc3339% %msg%\n")

ruleset(name="cgnRuleset") {
    # Optional debug tap — uncomment if you ever need to see raw messages
    # arriving independent of the PHP parser (useful for troubleshooting).
    # Remember to add logrotate for this file if you enable it long-term.
    # action(type="omfile" file="/var/log/cgn-debug.log" template="cgnTemplate")

    action(
        type="omprog"
        binary="/usr/bin/php /opt/cgn-logger/parser.php"
        template="cgnTemplate"
        useTransactions="off"
        confirmMessages="off"
        forceSingleInstance="on"
    )
    stop
}

input(type="imudp" port="20514" ruleset="cgnRuleset")
